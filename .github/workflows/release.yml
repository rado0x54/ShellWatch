name: Release

# Two trigger paths:
#
# 1. push to develop or main (server-relevant paths) → CI, build Docker,
#    deploy to app-dev (develop) or app-preprod (main). Path-filtered: pure
#    docs/design/agent-only changes don't rebuild or redeploy the server.
#
# 2. workflow_dispatch with a version input → cut a release. Promotes the
#    preprod-soaked :stable image to versioned tags, deploys prod, publishes
#    the GitHub release, and opens a CHANGELOG.md PR back to develop.
#
# No source files are bumped during release. The git tag and GitHub release
# are the source of truth for the version; the image carries it via GIT_TAG
# env stamped by `crane mutate`. CHANGELOG.md updates flow through normal PR
# review, so main and develop never receive bot-authored direct pushes —
# branch protection rulesets stay active.
#
# Dispatch must run from main. The release promotes the :stable image (built
# when main is pushed), so what's on develop is irrelevant — develop is free
# to be ahead. The "ready to ship" gate is whatever you fast-forwarded onto
# main; that push triggered preprod deploy via path #1, giving you a chance
# to verify before clicking Run workflow.

on:
  push:
    branches: [develop, main]
    paths-ignore:
      - "agent-client/**"
      - "docs/**"
      - "design/**"
      - "**/*.md"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.0.3 — no v prefix)"
        required: true
        type: string

permissions:
  contents: write
  packages: write
  pull-requests: write

concurrency:
  # Single global queue across push and dispatch. A release dispatch reads
  # :stable while crane-mutating it; concurrent push-to-main docker jobs
  # would race that. Costs ~5min of develop-push serialization during a
  # release — worth it for the safety.
  group: release-singleton
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/rado0x54/shellwatch

jobs:
  # ------------------------------------------------------------ push path

  ci:
    if: github.event_name == 'push'
    uses: ./.github/workflows/ci.yml

  docker:
    name: Docker
    if: github.event_name == 'push'
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Compute tags
        id: tags
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          BRANCH=${GITHUB_REF_NAME}
          if [ "$BRANCH" = "develop" ]; then
            echo "tags=${{ env.IMAGE }}:develop,${{ env.IMAGE }}:sha-${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          elif [ "$BRANCH" = "main" ]; then
            echo "tags=${{ env.IMAGE }}:stable,${{ env.IMAGE }}:sha-${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          provenance: false
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            GIT_REF=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-dev:
    name: Deploy to app-dev
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          port: ${{ secrets.VPS_SSH_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /srv/shellwatch-dev
            docker compose pull
            docker compose up -d --wait --wait-timeout 60
            docker image prune -f

      - name: Smoke test
        run: curl -fsS --retry 5 --retry-delay 3 "${{ secrets.APP_URL_DEV }}/health"

  deploy-preprod:
    name: Deploy to app-preprod
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          port: ${{ secrets.VPS_SSH_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /srv/shellwatch-preprod
            docker compose pull
            docker compose up -d --wait --wait-timeout 60
            docker image prune -f

      - name: Smoke test
        run: curl -fsS --retry 5 --retry-delay 3 "${{ secrets.APP_URL_PREPROD }}/health"

  # -------------------------------------------------- workflow_dispatch path

  release:
    name: Release
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Validate dispatch ref & version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "::error::This workflow must be dispatched from main (got ${GITHUB_REF})"
            exit 1
          fi

          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"

          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version: ${VERSION} (must be MAJOR.MINOR.PATCH)"
            exit 1
          fi

          PREV_TAG=$(git tag --list 'v*' --sort=-v:refname | head -1 || true)
          if [ -n "$PREV_TAG" ]; then
            CURRENT="${PREV_TAG#v}"
            if ! dpkg --compare-versions "$VERSION" gt "$CURRENT"; then
              echo "::error::Version ${VERSION} must be greater than latest tag ${PREV_TAG}"
              exit 1
            fi
          fi

          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "::error::Tag v${VERSION} already exists"
            exit 1
          fi

          if gh release view "v${VERSION}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::error::Release v${VERSION} already exists"
            exit 1
          fi

          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "TAG=v${VERSION}" >> "$GITHUB_ENV"
          echo "PREV_TAG=${PREV_TAG}" >> "$GITHUB_ENV"

      # Build the standalone tarball first — if pnpm build fails, abort
      # before touching prod or the registry.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Build standalone tarball
        run: |
          set -euo pipefail
          STAGING="shellwatch-${VERSION}"
          mkdir "$STAGING"
          cp -r dist drizzle package.json pnpm-lock.yaml pnpm-workspace.yaml config.sample.yaml "$STAGING/"
          tar czf "${STAGING}.tar.gz" "$STAGING"
          sha256sum "${STAGING}.tar.gz" > "${STAGING}.tar.gz.sha256"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: imjasonh/setup-crane@v0.4

      - name: Promote :stable to :version / :minor / :latest / :stable
        run: |
          set -euo pipefail
          MINOR=${VERSION%.*}
          SRC="${{ env.IMAGE }}:stable"
          DST="${{ env.IMAGE }}:${VERSION}"

          if ! crane manifest "$SRC" >/dev/null 2>&1; then
            echo "::error::$SRC not found. Did you fast-forward main from develop and let the docker job complete before dispatching?"
            exit 1
          fi

          # Stamp GIT_TAG into the image config so the UI displays "vX.Y.Z".
          # Image bits are bit-identical to $SRC (the preprod-running image).
          # Read at server boot by src/server/buildInfo.ts.
          #
          # Re-tagging :stable here keeps it pointing at the released bits
          # (otherwise it would drift behind :latest after every release).
          crane mutate "$SRC" --env "GIT_TAG=v${VERSION}" -t "$DST"
          crane tag "$DST" "${MINOR}"
          crane tag "$DST" "latest"
          crane tag "$DST" "stable"

      - name: Deploy prod
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          port: ${{ secrets.VPS_SSH_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /srv/shellwatch
            docker compose pull
            docker compose up -d --wait --wait-timeout 60
            docker image prune -f

      - name: Smoke test prod
        run: curl -fsS --retry 5 --retry-delay 3 "${{ secrets.APP_URL_PROD }}/health"

      - name: Tag commit & push tag
        run: |
          set -euo pipefail
          # Tag main HEAD (the FF'd commit, same one that's now serving prod).
          # Only happens after prod deploy + smoke test pass — no orphan tags.
          git tag "${TAG}" HEAD
          git push origin "refs/tags/${TAG}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PAYLOAD=$(jq -n \
            --arg tag "${TAG}" \
            --arg target "main" \
            --arg prev "${PREV_TAG}" \
            'if $prev == "" then {tag_name:$tag, target_commitish:$target}
             else {tag_name:$tag, target_commitish:$target, previous_tag_name:$prev} end')

          BODY=$(echo "$PAYLOAD" | gh api -X POST "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            --input - --jq .body)

          # Drop the bot's prior CHANGELOG-PR bullet (otherwise every release
          # would echo the previous release's changelog-update PR).
          BODY=$(echo "$BODY" | sed -E '/^[*\-] +chore: update CHANGELOG/d')

          # Normalize bullets to "- " (matches existing CHANGELOG style)
          BODY=$(echo "$BODY" | sed -E 's|^[*+] +|- |')

          printf '%s\n' "$BODY" > /tmp/release-body.md

          gh release create "${TAG}" \
            --title "ShellWatch ${TAG}" \
            --notes-file /tmp/release-body.md \
            "shellwatch-${VERSION}.tar.gz" \
            "shellwatch-${VERSION}.tar.gz.sha256"

      # Open a PR with the new CHANGELOG entry against develop. Admin pushes
      # any commit to trigger CI (GITHUB_TOKEN-authored PRs don't auto-fire
      # workflows), squash-merges, then fast-forwards main.
      - name: Open CHANGELOG PR to develop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="chore/changelog-${VERSION}"
          NOTES=$(cat /tmp/release-body.md)
          ENTRY="## ${TAG} ($(date -u +%Y-%m-%d))"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin develop
          git fetch origin "$BRANCH" 2>/dev/null || true
          git checkout -B "$BRANCH" origin/develop

          # Re-run guard: skip if develop already merged this entry
          if [ -f CHANGELOG.md ] && grep -qF "$ENTRY" CHANGELOG.md; then
            echo "CHANGELOG.md already contains entry for ${TAG}; skipping"
            exit 0
          fi

          # Insert above the first `## ` heading so a leading `# Changelog`
          # title (if added later) stays at the top of the file.
          ENTRY_FILE=/tmp/new-entry.md
          {
            printf '%s\n\n' "$ENTRY"
            printf '%s\n\n' "$NOTES"
          } > "$ENTRY_FILE"

          if [ ! -f CHANGELOG.md ]; then
            cp "$ENTRY_FILE" CHANGELOG.md
          else
            INSERT_LINE=$(grep -nE '^## ' CHANGELOG.md | head -1 | cut -d: -f1 || true)
            if [ -z "$INSERT_LINE" ]; then
              cat CHANGELOG.md "$ENTRY_FILE" > CHANGELOG.md.new
            else
              head -n $((INSERT_LINE - 1)) CHANGELOG.md > CHANGELOG.md.new
              cat "$ENTRY_FILE" >> CHANGELOG.md.new
              tail -n +"$INSERT_LINE" CHANGELOG.md >> CHANGELOG.md.new
            fi
            mv CHANGELOG.md.new CHANGELOG.md
          fi
          rm -f "$ENTRY_FILE"

          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No changelog changes to commit"
            exit 0
          fi
          git commit -m "chore: update CHANGELOG.md for ${TAG}"
          git push --force-with-lease origin "$BRANCH"

          EXISTING=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already open for $BRANCH; skipping create"
            exit 0
          fi

          gh pr create \
            --base develop \
            --head "$BRANCH" \
            --title "chore: update CHANGELOG.md for ${TAG}" \
            --body "Auto-generated changelog for ${TAG}. Push any commit to trigger CI (GITHUB_TOKEN-authored PRs don't auto-trigger workflows), then squash-merge and fast-forward main."
