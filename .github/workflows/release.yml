name: Release

on:
  push:
    branches: [develop, main]
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  pull-requests: write

env:
  IMAGE: ghcr.io/rado0x54/shellwatch

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  docker:
    name: Docker
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Compute tags
        id: tags
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "sha_short=$SHA_SHORT" >> "$GITHUB_OUTPUT"

          BRANCH=${GITHUB_REF_NAME}
          if [ "$BRANCH" = "develop" ]; then
            echo "tags=${{ env.IMAGE }}:develop,${{ env.IMAGE }}:sha-${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          elif [ "$BRANCH" = "main" ]; then
            echo "tags=${{ env.IMAGE }}:stable,${{ env.IMAGE }}:sha-${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          provenance: false
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            GIT_REF=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-dev:
    name: Deploy to app-dev
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          port: ${{ secrets.VPS_SSH_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /srv/shellwatch-dev
            docker compose pull
            docker compose up -d --wait --wait-timeout 60
            docker image prune -f

      - name: Smoke test
        run: curl -fsS --retry 5 --retry-delay 3 https://app-dev.shellwatch.ai/health

  deploy-preprod:
    name: Deploy to app-preprod
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          port: ${{ secrets.VPS_SSH_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /srv/shellwatch-preprod
            docker compose pull
            docker compose up -d --wait --wait-timeout 60
            docker image prune -f

      - name: Smoke test
        run: curl -fsS --retry 5 --retry-delay 3 https://app-preprod.shellwatch.ai/health

  retag:
    name: Retag Docker image
    needs: ci
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: imjasonh/setup-crane@v0.4

      - name: Retag image with version env
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          VERSION=${GITHUB_REF_NAME#v}
          MINOR=${VERSION%.*}

          SRC="${{ env.IMAGE }}:sha-${SHA_SHORT}"

          echo "Checking for source image: $SRC"
          if ! crane manifest "$SRC" > /dev/null 2>&1; then
            echo "::error::Image $SRC not found. Push the tagged commit to main or develop first to trigger a Docker build."
            exit 1
          fi

          # Tag releases: stamp GIT_TAG into the image config so the UI displays
          # "v$VERSION" instead of "main@<sha>". Only the image config blob
          # changes; layer DAG is bit-identical to $SRC. Read at server boot
          # by src/server/buildInfo.ts.
          DST="${{ env.IMAGE }}:${VERSION}"
          echo "Releasing v${VERSION}: stamping GIT_TAG onto $SRC → $DST, :${MINOR}, :latest"
          crane mutate "$SRC" --env "GIT_TAG=v${VERSION}" -t "$DST"
          crane tag "$DST" "${MINOR}"
          crane tag "$DST" "latest"

  deploy-prod:
    name: Deploy to app (prod)
    needs: retag
    runs-on: ubuntu-latest
    environment: production
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          port: ${{ secrets.VPS_SSH_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /srv/shellwatch
            docker compose pull
            docker compose up -d --wait --wait-timeout 60
            docker image prune -f

      - name: Smoke test
        run: curl -fsS --retry 5 --retry-delay 3 https://app.shellwatch.ai/health

  release:
    name: GitHub Release
    needs: [ci, retag]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Build standalone tarball
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          STAGING="shellwatch-${VERSION}"
          mkdir "$STAGING"
          cp -r dist drizzle package.json pnpm-lock.yaml pnpm-workspace.yaml config.sample.yaml "$STAGING/"
          tar czf "${STAGING}.tar.gz" "$STAGING"
          sha256sum "${STAGING}.tar.gz" > "${STAGING}.tar.gz.sha256"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          gh release create "$GITHUB_REF_NAME" \
            --title "ShellWatch v${VERSION}" \
            --generate-notes \
            shellwatch-${VERSION}.tar.gz \
            shellwatch-${VERSION}.tar.gz.sha256

      # main/develop are protected by rulesets (PR + status checks required, no
      # bypass for GITHUB_TOKEN). The bot opens a PR against develop; admin
      # reviews, pushes any commit to trigger CI (GITHUB_TOKEN-authored PRs
      # don't auto-trigger workflows), squash-merges, and fast-forwards main.
      - name: Open changelog PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          BRANCH="chore/changelog-${VERSION}"

          NOTES=$(gh release view "$GITHUB_REF_NAME" --json body -q .body)
          NOTES=$(echo "$NOTES" | sed -E "s|https://github\\.com/${REPO}/pull/([0-9]+)|[#\\1](https://github.com/${REPO}/pull/\\1)|g")
          # Normalize *  / +  bullets to "- " (matches existing CHANGELOG style)
          NOTES=$(echo "$NOTES" | sed -E 's|^[*+] +|- |')
          ENTRY="## v${VERSION} ($(date -u +%Y-%m-%d))"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin develop
          # Fetch the chore branch too so --force-with-lease has a real lease
          # ref instead of falling back to allowing the push unconditionally
          git fetch origin "$BRANCH" 2>/dev/null || true
          git checkout -B "$BRANCH" origin/develop

          # Re-run guard: if the entry is already in the file (e.g. develop
          # already merged the bot's PR for this tag), don't append a duplicate
          if [ -f CHANGELOG.md ] && grep -qF "$ENTRY" CHANGELOG.md; then
            echo "CHANGELOG.md already contains entry for ${GITHUB_REF_NAME}; skipping"
            exit 0
          fi

          {
            printf '%s\n\n' "$ENTRY"
            printf '%s\n\n' "$NOTES"
            [ -f CHANGELOG.md ] && cat CHANGELOG.md
          } > CHANGELOG.md.new
          mv CHANGELOG.md.new CHANGELOG.md

          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No changelog changes to commit"
            exit 0
          fi
          git commit -m "chore: update CHANGELOG.md for ${GITHUB_REF_NAME}"
          git push --force-with-lease origin "$BRANCH"

          # Skip PR creation if one is already open for this branch (re-run safe)
          EXISTING=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already open for $BRANCH; skipping create"
            exit 0
          fi

          gh pr create \
            --base develop \
            --head "$BRANCH" \
            --title "chore: update CHANGELOG.md for ${GITHUB_REF_NAME}" \
            --body "Auto-generated changelog for ${GITHUB_REF_NAME}. Push any commit to trigger CI (GITHUB_TOKEN-authored PRs don't auto-trigger workflows), then squash-merge and fast-forward main."
