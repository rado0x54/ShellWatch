name: Agent Release

on:
  push:
    tags: ["agent/v*"]

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Build & Release Agent
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: agent-client/go.mod
          cache-dependency-path: agent-client/go.sum

      - name: Build
        working-directory: agent-client
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=${GITHUB_REF_NAME#agent/}
          BINARY="shellwatch-agent-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build -ldflags="-s -w -X main.version=${VERSION}" \
            -o "../${BINARY}" ./cmd/shellwatch-agent
          cd ..
          sha256sum "${BINARY}" > "${BINARY}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: agent-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            shellwatch-agent-*
            !agent-client/

  publish:
    name: Publish Release
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate release notes
        id: notes
        run: |
          # Find the previous agent tag
          PREV_TAG=$(git tag --list 'agent/v*' --sort=-v:refname | grep -v "$GITHUB_REF_NAME" | head -1)
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${GITHUB_REF_NAME}"
          else
            RANGE="$GITHUB_REF_NAME"
          fi

          # Generate notes from commits touching agent-client/ only
          NOTES=$(git log "$RANGE" --pretty=format:"* %s (%h)" -- agent-client/)
          if [ -z "$NOTES" ]; then
            NOTES="* Initial release"
          fi

          # Convert PR references to clickable markdown links
          REPO="${{ github.repository }}"
          # First: bare (#N) from commit messages → clickable
          NOTES=$(echo "$NOTES" | sed -E "s|\\(#([0-9]+)\\)|([#\\1](https://github.com/${REPO}/pull/\\1))|g")
          # Then: any remaining full URLs → clickable (safety net)
          NOTES=$(echo "$NOTES" | sed -E "s|([^(])https://github\\.com/${REPO}/pull/([0-9]+)|\\1[#\\2](https://github.com/${REPO}/pull/\\2)|g")

          # Write to file for multi-line output
          echo "$NOTES" > /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME#agent/}
          gh release create "$GITHUB_REF_NAME" \
            --title "ShellWatch Agent ${VERSION}" \
            --notes-file /tmp/release-notes.md \
            artifacts/shellwatch-agent-*

      # main/develop are protected by rulesets (PR + status checks required, no
      # bypass for GITHUB_TOKEN). The bot opens a PR against develop; admin
      # reviews, pushes any commit to trigger CI (GITHUB_TOKEN-authored PRs
      # don't auto-trigger workflows), squash-merges, and fast-forwards main.
      - name: Open agent changelog PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME#agent/}
          BRANCH="chore/agent-changelog-${VERSION}"
          NOTES=$(cat /tmp/release-notes.md)
          ENTRY="## ${VERSION} ($(date -u +%Y-%m-%d))"
          CHANGELOG="agent-client/CHANGELOG.md"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin develop
          # Fetch the chore branch too so --force-with-lease has a real lease
          # ref instead of falling back to allowing the push unconditionally
          git fetch origin "$BRANCH" 2>/dev/null || true
          git checkout -B "$BRANCH" origin/develop

          # Re-run guard: if the entry is already in the file (e.g. develop
          # already merged the bot's PR for this tag), don't append a duplicate
          if [ -f "$CHANGELOG" ] && grep -qF "$ENTRY" "$CHANGELOG"; then
            echo "$CHANGELOG already contains entry for ${GITHUB_REF_NAME}; skipping"
            exit 0
          fi

          {
            printf '%s\n\n' "$ENTRY"
            printf '%s\n\n' "$NOTES"
            [ -f "$CHANGELOG" ] && cat "$CHANGELOG"
          } > "${CHANGELOG}.new"
          mv "${CHANGELOG}.new" "$CHANGELOG"

          git add "$CHANGELOG"
          if git diff --cached --quiet; then
            echo "No changelog changes to commit"
            exit 0
          fi
          git commit -m "chore: update agent CHANGELOG.md for ${GITHUB_REF_NAME}"
          git push --force-with-lease origin "$BRANCH"

          # Skip PR creation if one is already open for this branch (re-run safe)
          EXISTING=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already open for $BRANCH; skipping create"
            exit 0
          fi

          gh pr create \
            --base develop \
            --head "$BRANCH" \
            --title "chore: update agent CHANGELOG.md for ${GITHUB_REF_NAME}" \
            --body "Auto-generated agent changelog for ${GITHUB_REF_NAME}. Push any commit to trigger CI (GITHUB_TOKEN-authored PRs don't auto-trigger workflows), then squash-merge and fast-forward main."
