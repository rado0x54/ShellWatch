name: Agent Release

on:
  push:
    tags: ["agent/v*"]

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  release:
    name: Build & Release Agent
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: agent-client/go.mod
          cache-dependency-path: agent-client/go.sum

      - name: Build
        working-directory: agent-client
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=${GITHUB_REF_NAME#agent/}
          BINARY="shellwatch-agent-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build -ldflags="-s -w -X main.version=${VERSION}" \
            -o "../${BINARY}" ./cmd/shellwatch-agent
          cd ..
          sha256sum "${BINARY}" > "${BINARY}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: agent-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            shellwatch-agent-*
            !agent-client/

  publish:
    name: Publish Release
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate release notes
        id: notes
        run: |
          # Find the previous agent tag
          PREV_TAG=$(git tag --list 'agent/v*' --sort=-v:refname | grep -v "$GITHUB_REF_NAME" | head -1)
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${GITHUB_REF_NAME}"
          else
            RANGE="$GITHUB_REF_NAME"
          fi

          # Generate notes from commits touching agent-client/ only
          NOTES=$(git log "$RANGE" --pretty=format:"* %s (%h)" -- agent-client/)
          if [ -z "$NOTES" ]; then
            NOTES="* Initial release"
          fi

          # Convert PR references to clickable markdown links
          # First: bare (#N) from commit messages → clickable
          NOTES=$(echo "$NOTES" | sed -E 's|\(#([0-9]+)\)|([#\1](https://github.com/rado0x54/ShellWatch/pull/\1))|g')
          # Then: any remaining full URLs → clickable (safety net)
          NOTES=$(echo "$NOTES" | sed -E 's|([^(])https://github\.com/rado0x54/ShellWatch/pull/([0-9]+)|\1[#\2](https://github.com/rado0x54/ShellWatch/pull/\2)|g')

          # Write to file for multi-line output
          echo "$NOTES" > /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME#agent/}
          gh release create "$GITHUB_REF_NAME" \
            --title "ShellWatch Agent ${VERSION}" \
            --notes-file /tmp/release-notes.md \
            artifacts/shellwatch-agent-*

      # main/develop are protected by rulesets (PR + status checks required, no
      # bypass for GITHUB_TOKEN). The bot opens a PR against develop instead of
      # pushing directly; admin squash-merges and fast-forwards main.
      - name: Open agent changelog PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME#agent/}
          BRANCH="chore/agent-changelog-${VERSION}"
          NOTES=$(cat /tmp/release-notes.md)
          ENTRY="## ${VERSION} ($(date -u +%Y-%m-%d))"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin develop
          git checkout -b "$BRANCH" origin/develop

          CHANGELOG="agent-client/CHANGELOG.md"
          {
            printf '%s\n\n' "$ENTRY"
            printf '%s\n\n' "$NOTES"
            [ -f "$CHANGELOG" ] && cat "$CHANGELOG"
          } > "${CHANGELOG}.new"
          mv "${CHANGELOG}.new" "$CHANGELOG"

          git add "$CHANGELOG"
          if git diff --cached --quiet; then
            echo "No changelog changes to commit"
            exit 0
          fi
          git commit -m "chore: update agent CHANGELOG.md for ${GITHUB_REF_NAME}"
          git push origin "$BRANCH"

          gh pr create \
            --base develop \
            --head "$BRANCH" \
            --title "chore: update agent CHANGELOG.md for ${GITHUB_REF_NAME}" \
            --body "Auto-generated agent changelog for ${GITHUB_REF_NAME}. Squash-merge once CI passes, then fast-forward main."

          # GITHUB_TOKEN-created PRs don't auto-trigger workflows (anti-loop guard).
          # Dispatch CI manually so required status checks run on the PR head SHA.
          gh workflow run ci.yml --ref "$BRANCH"
