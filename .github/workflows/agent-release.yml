name: Agent Release

# Manually triggered from main. Enter the version (e.g. `0.0.3`).
#
# Steps:
#   1. validate dispatched from main + version > latest agent/v* tag
#   2. cross-build linux/{amd64,arm64} + darwin/{amd64,arm64} binaries
#   3. tag main HEAD as agent/vX.Y.Z, push tag
#   4. create GitHub release with binaries + sha256s
#   5. open agent-client/CHANGELOG.md PR to develop
#
# No source files are bumped. main.Version is injected via -ldflags at build
# time. CHANGELOG.md updates flow through normal PR review, so main and
# develop never receive bot-authored direct pushes — branch protection
# rulesets stay active.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.0.3 — no v prefix)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: agent-release
  cancel-in-progress: false

jobs:
  prepare:
    name: Validate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set.outputs.version }}
      tag: ${{ steps.set.outputs.tag }}
      prev_tag: ${{ steps.set.outputs.prev_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - id: set
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "::error::This workflow must be dispatched from main (got ${GITHUB_REF})"
            exit 1
          fi

          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"

          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version: ${VERSION} (must be MAJOR.MINOR.PATCH)"
            exit 1
          fi

          PREV_TAG=$(git tag --list 'agent/v*' --sort=-v:refname | head -1 || true)
          if [ -n "$PREV_TAG" ]; then
            CURRENT="${PREV_TAG#agent/v}"
            if ! dpkg --compare-versions "$VERSION" gt "$CURRENT"; then
              echo "::error::Version ${VERSION} must be greater than latest agent tag ${PREV_TAG}"
              exit 1
            fi
          fi

          if git rev-parse "agent/v${VERSION}" >/dev/null 2>&1; then
            echo "::error::Tag agent/v${VERSION} already exists"
            exit 1
          fi

          if gh release view "agent/v${VERSION}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::error::Release agent/v${VERSION} already exists"
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=agent/v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "prev_tag=${PREV_TAG}" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64, ext: .exe }
          - { goos: windows, goarch: arm64, ext: .exe }
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-go@v5
        with:
          go-version-file: agent-client/go.mod
          cache-dependency-path: agent-client/go.sum

      - name: Build
        working-directory: agent-client
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare.outputs.version }}"
          BINARY="shellwatch-agent-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          go build -ldflags="-s -w -X main.Version=${VERSION}" \
            -o "../${BINARY}" ./cmd/shellwatch-agent
          cd ..
          sha256sum "${BINARY}" > "${BINARY}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: agent-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            shellwatch-agent-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
            shellwatch-agent-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}.sha256

  release:
    name: Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: actions/setup-go@v5
        with:
          go-version-file: agent-client/go.mod
          cache-dependency-path: agent-client/go.sum

      - name: Bundle agent third-party licenses
        working-directory: agent-client
        run: make licenses

      - name: Generate path-scoped release notes
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          TAG: ${{ needs.prepare.outputs.tag }}
          PREV_TAG: ${{ needs.prepare.outputs.prev_tag }}
        run: |
          set -euo pipefail
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi

          # Path-scope to agent-client/, and exclude the bot's prior CHANGELOG
          # commits (which would otherwise echo every release into the next).
          NOTES=$(git log "$RANGE" \
            --pretty=format:"- %s" \
            --invert-grep --grep='^chore: update agent CHANGELOG' \
            -- agent-client/ || true)

          if [ -z "$NOTES" ]; then
            if [ -n "$PREV_TAG" ]; then
              NOTES="- No agent changes since ${PREV_TAG}"
            else
              NOTES="- Initial release"
            fi
          fi

          # Convert (#N) PR refs to clickable links
          REPO="${GITHUB_REPOSITORY}"
          NOTES=$(echo "$NOTES" | sed -E "s|\\(#([0-9]+)\\)|([#\\1](https://github.com/${REPO}/pull/\\1))|g")

          printf '%s\n' "$NOTES" > /tmp/release-body.md

      - name: Tag commit & push tag
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          git tag "${TAG}" HEAD
          git push origin "refs/tags/${TAG}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.prepare.outputs.version }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          # Upload agent-client/LICENSE under a disambiguated name so a future
          # umbrella release can include the root LICENSE without conflict.
          cp agent-client/LICENSE LICENSE-shellwatch-agent
          gh release create "${TAG}" \
            --title "ShellWatch Agent ${VERSION}" \
            --notes-file /tmp/release-body.md \
            artifacts/shellwatch-agent-* \
            LICENSE-shellwatch-agent \
            AGENT_THIRD_PARTY_LICENSES

      # main/develop are protected by rulesets — bot opens a PR. Admin pushes
      # any commit to trigger CI (GITHUB_TOKEN-authored PRs don't auto-fire
      # workflows), squash-merges, then fast-forwards main.
      - name: Open CHANGELOG PR to develop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.prepare.outputs.version }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          BRANCH="chore/agent-changelog-${VERSION}"
          NOTES=$(cat /tmp/release-body.md)
          ENTRY="## ${TAG#agent/} ($(date -u +%Y-%m-%d))"
          CHANGELOG="agent-client/CHANGELOG.md"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin develop
          git fetch origin "$BRANCH" 2>/dev/null || true
          git checkout -B "$BRANCH" origin/develop

          if [ -f "$CHANGELOG" ] && grep -qF "$ENTRY" "$CHANGELOG"; then
            echo "$CHANGELOG already contains entry for ${TAG}; skipping"
            exit 0
          fi

          # Insert above the first `## ` heading so a leading `# Changelog`
          # title (if added later) stays at the top of the file.
          ENTRY_FILE=/tmp/new-entry.md
          {
            printf '%s\n\n' "$ENTRY"
            printf '%s\n\n' "$NOTES"
          } > "$ENTRY_FILE"

          if [ ! -f "$CHANGELOG" ]; then
            cp "$ENTRY_FILE" "$CHANGELOG"
          else
            INSERT_LINE=$(grep -nE '^## ' "$CHANGELOG" | head -1 | cut -d: -f1 || true)
            if [ -z "$INSERT_LINE" ]; then
              cat "$CHANGELOG" "$ENTRY_FILE" > "${CHANGELOG}.new"
            else
              head -n $((INSERT_LINE - 1)) "$CHANGELOG" > "${CHANGELOG}.new"
              cat "$ENTRY_FILE" >> "${CHANGELOG}.new"
              tail -n +"$INSERT_LINE" "$CHANGELOG" >> "${CHANGELOG}.new"
            fi
            mv "${CHANGELOG}.new" "$CHANGELOG"
          fi
          rm -f "$ENTRY_FILE"

          git add "$CHANGELOG"
          if git diff --cached --quiet; then
            echo "No changelog changes to commit"
            exit 0
          fi
          git commit -m "chore: update agent CHANGELOG.md for ${TAG}"
          git push --force-with-lease origin "$BRANCH"

          EXISTING=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already open for $BRANCH; skipping create"
            exit 0
          fi

          gh pr create \
            --base develop \
            --head "$BRANCH" \
            --title "chore: update agent CHANGELOG.md for ${TAG}" \
            --body "Auto-generated agent changelog for ${TAG}. Push any commit to trigger CI (GITHUB_TOKEN-authored PRs don't auto-trigger workflows), then squash-merge and fast-forward main."
