name: PAM Module Release

on:
  push:
    tags: ["pam/v*"]

permissions:
  contents: write

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install PAM headers
        run: sudo apt-get install -y libpam0g-dev

      - name: Clippy
        working-directory: pam_ssh_webauthn
        run: cargo clippy -- -D warnings

      - name: Test
        working-directory: pam_ssh_webauthn
        run: cargo test

  build:
    name: Build (${{ matrix.target }})
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-20.04
            artifact: pam_ssh_webauthn-x86_64-linux-gnu.so
            cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-20.04
            artifact: pam_ssh_webauthn-aarch64-linux-gnu.so
            cross: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install PAM headers (native)
        if: ${{ !matrix.cross }}
        run: sudo apt-get install -y libpam0g-dev

      - name: Install cross-compilation toolchain (aarch64)
        if: ${{ matrix.cross }}
        run: |
          sudo dpkg --add-architecture arm64
          # Add arm64 package sources
          sudo sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ focal main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ focal-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libpam0g-dev:arm64

      - name: Configure cross-compilation
        if: ${{ matrix.cross }}
        run: |
          mkdir -p .cargo
          cat >> .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build
        working-directory: pam_ssh_webauthn
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename artifact
        run: |
          cp pam_ssh_webauthn/target/${{ matrix.target }}/release/libpam_ssh_webauthn.so \
             ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Package & Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download prebuilt binaries
        uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true

      - name: Generate checksums for binaries
        run: |
          cd binaries
          for f in *.so; do
            sha256sum "$f" > "${f}.sha256"
          done

      - name: Package source
        run: |
          VERSION=${GITHUB_REF_NAME#pam/}
          ARCHIVE="pam_ssh_webauthn-${VERSION}-source"

          # Create clean source archive (no target/, .gitignore artifacts)
          mkdir -p "${ARCHIVE}"
          cp -r pam_ssh_webauthn/Cargo.toml \
                pam_ssh_webauthn/Cargo.lock \
                pam_ssh_webauthn/README.md \
                pam_ssh_webauthn/src \
                pam_ssh_webauthn/examples \
                pam_ssh_webauthn/tests \
                "${ARCHIVE}/"

          zip -r "${ARCHIVE}.zip" "${ARCHIVE}"
          sha256sum "${ARCHIVE}.zip" > "${ARCHIVE}.zip.sha256"
          tar czf "${ARCHIVE}.tar.gz" "${ARCHIVE}"
          sha256sum "${ARCHIVE}.tar.gz" > "${ARCHIVE}.tar.gz.sha256"

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git tag --list 'pam/v*' --sort=-v:refname | grep -v "$GITHUB_REF_NAME" | head -1)
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${GITHUB_REF_NAME}"
          else
            RANGE="$GITHUB_REF_NAME"
          fi

          NOTES=$(git log "$RANGE" --pretty=format:"* %s (%h)" -- pam_ssh_webauthn/)
          if [ -z "$NOTES" ]; then
            NOTES="* Initial release"
          fi

          # Convert PR references to clickable markdown links
          NOTES=$(echo "$NOTES" | sed -E 's|\(#([0-9]+)\)|([#\1](https://github.com/${{ github.repository }}/pull/\1))|g')
          REPO="${{ github.repository }}"
          NOTES=$(echo "$NOTES" | sed -E "s|([^(])https://github\\.com/${REPO}/pull/([0-9]+)|\1[#\2](https://github.com/${REPO}/pull/\2)|g")

          VERSION=${GITHUB_REF_NAME#pam/}
          {
            echo "## Prebuilt binaries"
            echo ""
            echo "Prebuilt \`.so\` modules are available for common targets. Download the one matching your architecture and copy it into place:"
            echo ""
            echo "\`\`\`bash"
            echo "sudo cp pam_ssh_webauthn-x86_64-linux-gnu.so /usr/lib/x86_64-linux-gnu/security/pam_ssh_webauthn.so"
            echo "\`\`\`"
            echo ""
            echo "| File | Target |"
            echo "|------|--------|"
            echo "| \`pam_ssh_webauthn-x86_64-linux-gnu.so\` | x86_64 Linux (glibc, Ubuntu 20.04+, Debian 11+, RHEL 8+) |"
            echo "| \`pam_ssh_webauthn-aarch64-linux-gnu.so\` | ARM64 Linux (glibc, Ubuntu 20.04+, Debian 11+, Graviton) |"
            echo ""
            echo "These are dynamically linked against \`libpam\` and \`libc\` (glibc). Built on Ubuntu 20.04 for broad compatibility."
            echo ""
            echo "## Source distribution"
            echo ""
            echo "For other targets, or if you need the \`native-crypto\` (OpenSSL/FIPS) feature:"
            echo ""
            echo "\`\`\`bash"
            echo "tar xzf pam_ssh_webauthn-${VERSION}-source.tar.gz"
            echo "cd pam_ssh_webauthn-${VERSION}-source"
            echo "cargo build --release"
            echo "\`\`\`"
            echo ""
            echo "See [README.md](https://github.com/${{ github.repository }}/blob/${GITHUB_REF_NAME}/pam_ssh_webauthn/README.md) for full build and setup instructions."
            echo ""
            echo "## Changes"
            echo ""
            echo "$NOTES"
          } > /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME#pam/}
          gh release create "$GITHUB_REF_NAME" \
            --title "pam_ssh_webauthn ${VERSION}" \
            --notes-file /tmp/release-notes.md \
            binaries/pam_ssh_webauthn-x86_64-linux-gnu.so \
            binaries/pam_ssh_webauthn-x86_64-linux-gnu.so.sha256 \
            binaries/pam_ssh_webauthn-aarch64-linux-gnu.so \
            binaries/pam_ssh_webauthn-aarch64-linux-gnu.so.sha256 \
            pam_ssh_webauthn-${VERSION}-source.zip \
            pam_ssh_webauthn-${VERSION}-source.zip.sha256 \
            pam_ssh_webauthn-${VERSION}-source.tar.gz \
            pam_ssh_webauthn-${VERSION}-source.tar.gz.sha256

      - name: Update PAM CHANGELOG
        run: |
          VERSION=${GITHUB_REF_NAME#pam/}
          NOTES=$(grep "^\\*" /tmp/release-notes.md || echo "* Initial release")

          ENTRY="## ${VERSION} ($(date -u +%Y-%m-%d))"
          NEW_CONTENT="${ENTRY}"$'\n\n'"${NOTES}"

          CHANGELOG="pam_ssh_webauthn/CHANGELOG.md"
          if [ -f "$CHANGELOG" ]; then
            echo -e "${NEW_CONTENT}\n\n$(cat $CHANGELOG)" > "$CHANGELOG"
          else
            echo -e "# Changelog\n\n${NEW_CONTENT}" > "$CHANGELOG"
          fi

      - name: Commit changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main develop
          git checkout main
          git add pam_ssh_webauthn/CHANGELOG.md
          git diff --cached --quiet && exit 0
          git commit -m "chore: update pam_ssh_webauthn CHANGELOG.md for ${GITHUB_REF_NAME}"
          COMMIT=$(git rev-parse HEAD)
          git push origin main
          # Sync changelog to develop
          git checkout develop
          git cherry-pick "$COMMIT" || git cherry-pick --abort
          git push origin develop || true
