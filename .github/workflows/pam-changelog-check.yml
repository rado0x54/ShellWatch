name: PAM CHANGELOG Check

on:
  pull_request:
    branches: [main]
    paths:
      - pam_ssh_webauthn/Cargo.toml
      - pam_ssh_webauthn/CHANGELOG.md

jobs:
  changelog-required:
    name: Cargo.toml bump requires CHANGELOG entry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check that a Cargo.toml version bump has a matching CHANGELOG section
        run: |
          set -euo pipefail
          BASE_REF="${{ github.base_ref }}"
          git fetch --no-tags origin "${BASE_REF}" --depth=1

          extract_version() {
            grep -E '^version' "$1" | head -1 | sed -E 's/^version = "(.+)"$/\1/'
          }

          CURRENT=$(extract_version pam_ssh_webauthn/Cargo.toml)
          BASE=$(git show "origin/${BASE_REF}:pam_ssh_webauthn/Cargo.toml" | grep -E '^version' | head -1 | sed -E 's/^version = "(.+)"$/\1/')

          if [ "$CURRENT" = "$BASE" ]; then
            echo "pam_ssh_webauthn version unchanged ($CURRENT) — CHANGELOG entry not required."
            exit 0
          fi

          echo "Detected version bump: $BASE → $CURRENT"

          if ! grep -qE "^## v${CURRENT//./\\.}( |\$)" pam_ssh_webauthn/CHANGELOG.md; then
            echo "::error file=pam_ssh_webauthn/CHANGELOG.md::Missing '## v${CURRENT}' section. Add release notes for the bump before merging to main."
            exit 1
          fi

          echo "CHANGELOG.md contains entry for v${CURRENT}."
