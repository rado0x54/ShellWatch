# Local Ory Hydra stack for ShellWatch (issue #217).
#
# Brings up the OAuth2/OIDC authority (Hydra) so you can exercise the full OAuth
# flows locally while running ShellWatch itself on the host via `pnpm dev`.
# Hydra is backed by a file SQLite database in ./data — the same folder
# ShellWatch keeps its own SQLite DB — so the whole deployment is single-file,
# no Postgres.
#
#   pnpm hydra:migrate                              # create/upgrade the schema
#   docker compose -f docker-compose.hydra.yml up -d
#   cp deploy/hydra/.env.sample .env.hydra          # then `--env-file .env.hydra`
#
# Schema migrations are NOT applied automatically — they can be destructive and
# should follow a backup. Run `pnpm hydra:migrate` explicitly (it backs up
# ./data/hydra.sqlite first) before starting Hydra and after any image bump.
#
# Ports exposed on the host:
#   4444  Hydra PUBLIC  — discovery, /oauth2/auth, /oauth2/token, MCP clients
#   4445  Hydra ADMIN   — login/consent accept, client CRUD, introspection.
#                         Bound to 127.0.0.1 only; never expose this publicly.
#
# ShellWatch (host) talks to Hydra at http://localhost:4444 (public) and
# http://localhost:4445 (admin); the browser is redirected to ShellWatch's
# login/consent providers at http://localhost:3000 (see deploy/hydra/hydra.yml).

services:
  hydra:
    image: oryd/hydra:v26.2.0
    ports:
      - "4444:4444"
      - "127.0.0.1:4445:4445"
    environment:
      # File SQLite in the bind-mounted ./data (host) → /data (container).
      # `_fk=true` enables foreign-key enforcement (Hydra relies on it).
      DSN: ${HYDRA_DSN:-sqlite:///data/hydra.sqlite?_fk=true}
      SECRETS_SYSTEM: ${HYDRA_SECRETS_SYSTEM:-this-is-a-dev-only-system-secret-change-me}
      # `--dev` accepts the http:// issuer without TLS; only for local dev.
    command: serve all --dev --config /etc/config/hydra.yml
    volumes:
      - ./deploy/hydra/hydra.yml:/etc/config/hydra.yml:ro
      - ./data:/data
    healthcheck:
      test: ["CMD", "hydra", "version"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
