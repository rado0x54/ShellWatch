# ShellWatch SSH endpoint configuration
# Copy this file to config.yaml and update with your SSH targets.
#
# Generate a key:  ssh-keygen -t ed25519 -f ./keys/my-server.pem -C "shellwatch"
# Add public key:  ssh-copy-id -i ./keys/my-server.pem.pub user@host

# SSH keys (shared across endpoints)
keys:
  - id: dev-key
    label: Dev Key
    privateKeyPath: ./keys/dev-box.pem

# SSH endpoints (reference keys by ID)
servers:
  - id: dev-box
    label: Dev Box
    host: dev.example.com
    port: 22
    username: ubuntu
    keyId: dev-key

  - id: staging
    label: Staging
    host: staging.example.com
    port: 22
    username: deploy
    keyId: dev-key

# Security settings
security:
  allowedNetworks:
    - 127.0.0.1/32
    - "::1/128"
