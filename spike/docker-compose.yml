# Phase 0 spike target (#232 item 4): OpenSSH server trusting the throwaway
# user CA generated by gen-spike-env.sh. Listens on 127.0.0.1:2222.
services:
  sshd:
    build: ./sshd
    ports:
      - "127.0.0.1:2222:22"
    volumes:
      - ./out/ca/user_ca.pub:/etc/ssh/user_ca.pub:ro
