<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShellWatch — Login</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: #1a1a2e;
        color: #e0e0e0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .login-card {
        background: #16213e;
        border: 1px solid #2a2a4a;
        border-radius: 12px;
        padding: 2.5rem;
        text-align: center;
        max-width: 380px;
        width: 90%;
      }
      h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; }
      .subtitle { color: #8888aa; font-size: 0.9rem; margin-bottom: 2rem; }
      .btn {
        display: inline-block;
        padding: 0.75rem 2rem;
        background: #4a9eff;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 1rem;
        cursor: pointer;
        font-weight: 500;
        width: 100%;
      }
      .btn:hover { background: #3b8de6; }
      .btn:disabled { background: #3a3a5a; color: #666; cursor: default; }
      .error { color: #f87171; font-size: 0.85rem; margin-top: 1rem; display: none; }
      .status { color: #8888aa; font-size: 0.85rem; margin-top: 1rem; }
    </style>
  </head>
  <body>
    <div class="login-card">
      <h1>ShellWatch</h1>
      <p class="subtitle">Touch your passkey to sign in</p>
      <button class="btn" id="login-btn">Sign in with Passkey</button>
      <p class="error" id="error-msg"></p>
      <p class="status" id="status-msg"></p>
    </div>
    <script src="config.js"></script>
    <script type="module" src="./src/login.ts"></script>
  </body>
</html>
