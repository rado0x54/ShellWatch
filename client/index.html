<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShellWatch</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <aside id="sidebar">
        <div class="sidebar-section">
          <h2>Endpoints</h2>
          <ul id="endpoint-list"></ul>
        </div>
        <div class="sidebar-section">
          <h2>Sessions</h2>
          <ul id="session-list"></ul>
        </div>
        <div class="sidebar-section sidebar-footer">
          <button type="button" class="btn btn-settings" id="observer-btn">Observer Mode</button>
          <button type="button" class="btn btn-settings" id="settings-btn" style="margin-top:0.5rem">Settings</button>
        </div>
      </aside>
      <main id="main">
        <div id="terminal-container">
          <div id="terminal-placeholder">Select an endpoint to connect</div>
        </div>
        <div id="settings-page" style="display:none"></div>
        <div id="observer-page" style="display:none"></div>
      </main>
    </div>
    <script src="config.js"></script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
